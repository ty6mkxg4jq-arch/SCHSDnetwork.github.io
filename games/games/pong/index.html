<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pong</title>
<style>
body {
  margin: 0;
  background: #0b3d91;
  display: flex;
  flex-direction: column;
  align-items: center;
  color: white;
  font-family: Arial;
}

canvas {
  background: #000;
  margin-top: 20px;
  border: 2px solid white;
}
</style>
</head>

<body>
<h1>Pong</h1>
<canvas id="game" width="500" height="300"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let ball = {x:250,y:150,vx:3,vy:3};
let paddle = {y:120};
let ai = {y:120};

document.addEventListener("mousemove", e => {
  let rect = canvas.getBoundingClientRect();
  paddle.y = e.clientY - rect.top - 40;
});

function loop(){
  ball.x += ball.vx;
  ball.y += ball.vy;

  ai.y += (ball.y - ai.y - 40)*0.05;

  if(ball.y<0||ball.y>300) ball.vy *= -1;

  if(ball.x<20 && ball.y>paddle.y && ball.y<paddle.y+80){
    ball.vx *= -1;
  }

  if(ball.x>480 && ball.y>ai.y && ball.y<ai.y+80){
    ball.vx *= -1;
  }

  if(ball.x<0||ball.x>500){
    ball.x=250; ball.y=150;
  }

  ctx.fillStyle="black";
  ctx.fillRect(0,0,500,300);

  ctx.fillStyle="white";
  ctx.fillRect(10,paddle.y,10,80);
  ctx.fillRect(480,ai.y,10,80);

  ctx.beginPath();
  ctx.arc(ball.x,ball.y,8,0,Math.PI*2);
  ctx.fill();
}

setInterval(loop,16);
</script>

</body>
</html>
